  <!-- Preloader -->
  <style>
    .preloader-overlay{
      position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .3s ease,visibility .3s ease;
    }
    .preloader-overlay.hidden{opacity:0;visibility:hidden}
    .preloader-spinner{width:72px;height:72px;border-radius:50%;border:8px solid #f3f3f3;border-top-color:#007bff;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* small text under spinner */
    .preloader-text{margin-top:12px;color:#666;font-family:Arial,Helvetica,sans-serif;font-size:14px;text-align:center}
    .preloader-inner{display:flex;flex-direction:column;align-items:center}
  </style>
  <div id="preloader" class="preloader-overlay">
    <div class="preloader-inner">
      <div class="preloader-spinner" aria-hidden="true"></div>
      <div class="preloader-text">Loading CureOn Medical Tourism...</div>
    </div>
  </div>

  <!-- Preloader hide script: remove overlay on window load or after timeout -->
  <script>
    (function(){
      const hidePreloader = ()=>{
        const p = document.getElementById('preloader');
        if(!p) return;
        p.classList.add('hidden');
        // optional: remove from DOM after transition
        setTimeout(()=>{ p.remove(); }, 350);
      };
      if (document.readyState === 'complete') {
        hidePreloader();
      } else {
        window.addEventListener('load', hidePreloader);
        // fallback: ensure preloader doesn't block indefinitely
        setTimeout(hidePreloader, 6000);
      }
    })();
  </script>
